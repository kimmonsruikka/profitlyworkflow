name: deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /app/profitlyworkflow
            git pull origin main
            ./venv/bin/pip install -r requirements.txt --quiet
            ./venv/bin/alembic upgrade head
            sudo cp deploy/edgar-watcher.service /etc/systemd/system/edgar-watcher.service
            sudo systemctl daemon-reload
            sudo systemctl enable edgar-watcher
            sudo systemctl restart trading-app
            sudo systemctl restart edgar-watcher
            sudo systemctl restart celery-worker || true
            sudo systemctl restart prefect-agent || true
            sleep 5
            curl -f http://localhost:8000/health || exit 1

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=<b>🚨 deploy failed</b>%0Acommit: ${GITHUB_SHA::7}%0Arun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
